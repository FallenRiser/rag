chunking:
  # -----------------------------------------------------------------------
  # Active strategy — change this one line to switch globally.
  # -----------------------------------------------------------------------
  # Strategies:
  #   document_aware   Docling HybridChunker (runs inside DoclingConverter,
  #                    best when export.type = doc_chunks)
  #   hierarchical     HierarchicalDocumentSplitter — parent/child tree
  #   recursive        RecursiveDocumentSplitter   — cascading separators
  #   sentence         DocumentSplitter(sentence)  — needs NLTK
  #   word             DocumentSplitter(word)
  #   passage          DocumentSplitter(passage)   — paragraph level
  #   page             DocumentSplitter(page)
  #   line             DocumentSplitter(line)
  #   character        RecursiveDocumentSplitter(char)
  #   token            RecursiveDocumentSplitter(token) — needs NLTK
  #   markdown_header  MarkdownHeaderSplitter (use with export.type=markdown)
  #   semantic         EmbeddingBasedDocumentSplitter  — cosine distance
  strategy: "word"

  # -----------------------------------------------------------------------
  # Shared defaults (used when a strategy's own section has no override)
  # -----------------------------------------------------------------------
  split_length: 300
  split_overlap: 50
  split_threshold: 10

  # -----------------------------------------------------------------------
  # document_aware — Docling HybridChunker (token-aware, structure-aware)
  # Chunking happens INSIDE DoclingConverter; no downstream splitter added.
  # -----------------------------------------------------------------------
  document_aware:
    tokenizer: "BAAI/bge-small-en-v1.5"
    max_tokens: 512
    merge_peers: true
    include_headings_in_metadata: true

  # -----------------------------------------------------------------------
  # hierarchical — HierarchicalDocumentSplitter
  # Creates parent→child block tree; pair with AutoMergingRetriever.
  # -----------------------------------------------------------------------
  hierarchical:
    block_sizes: [512, 128, 32]   # descending order required
    split_by: "word"              # word | sentence | passage | page
    split_overlap: 0

  # -----------------------------------------------------------------------
  # recursive — RecursiveDocumentSplitter
  # NOTE: Do NOT include "sentence" in separators unless nltk is installed.
  # -----------------------------------------------------------------------
  recursive:
    split_length: 300
    split_overlap: 50
    split_unit: "word"            # word | char | token
    separators: ["\n\n", "\n", " "]

  # -----------------------------------------------------------------------
  # sentence — DocumentSplitter(split_by="sentence")
  # Requires: pip install nltk && python -m nltk.downloader punkt_tab
  # -----------------------------------------------------------------------
  sentence:
    split_length: 10
    split_overlap: 2
    split_threshold: 1

  # -----------------------------------------------------------------------
  # word — DocumentSplitter(split_by="word")
  # -----------------------------------------------------------------------
  word:
    split_length: 300
    split_overlap: 50
    split_threshold: 10

  # -----------------------------------------------------------------------
  # passage — DocumentSplitter(split_by="passage")  [paragraph level]
  # -----------------------------------------------------------------------
  passage:
    split_length: 5
    split_overlap: 1
    split_threshold: 1

  # -----------------------------------------------------------------------
  # page — DocumentSplitter(split_by="page")
  # -----------------------------------------------------------------------
  page:
    split_length: 1
    split_overlap: 0
    split_threshold: 0

  # -----------------------------------------------------------------------
  # line — DocumentSplitter(split_by="line")
  # -----------------------------------------------------------------------
  line:
    split_length: 20
    split_overlap: 2
    split_threshold: 1

  # -----------------------------------------------------------------------
  # character — RecursiveDocumentSplitter(split_unit="char")
  # -----------------------------------------------------------------------
  character:
    split_length: 1500
    split_overlap: 200
    split_unit: "char"
    separators: ["\n\n", "\n", " ", ""]

  # -----------------------------------------------------------------------
  # token — RecursiveDocumentSplitter(split_unit="token")
  # Requires: pip install nltk && python -m nltk.downloader punkt_tab
  # -----------------------------------------------------------------------
  token:
    split_length: 512
    split_overlap: 64
    split_unit: "token"
    separators: ["\n\n", "\n", " "]

  # -----------------------------------------------------------------------
  # markdown_header — MarkdownHeaderSplitter
  # Best used when docling export.type = "markdown"
  # -----------------------------------------------------------------------
  markdown_header:
    keep_headers: true
    header_split_levels: null       # null = all levels; or list e.g. [1, 2]
    secondary_split: null           # null | word | passage | period | line
    split_length: 300
    split_overlap: 0
    split_threshold: 0
    skip_empty_documents: true

  # -----------------------------------------------------------------------
  # semantic — EmbeddingBasedDocumentSplitter
  # Uses the provider configured in embedding_config.yaml for boundaries.
  # -----------------------------------------------------------------------
  semantic:
    sentences_per_group: 3
    percentile: 0.95               # cosine-distance percentile threshold
    min_length: 50
    max_length: 1024

  # -----------------------------------------------------------------------
  # DocumentCleaner (always applied before chunking)
  # -----------------------------------------------------------------------
  cleaner:
    remove_empty_lines: true
    remove_extra_whitespaces: true
    remove_repeated_substrings: false
    min_content_length: 10
