embedding:
  # -----------------------------------------------------------------------
  # Active provider. Switch here to change embedding backend globally.
  # Providers: azure_openai | openai | ollama | sentence_transformers | cohere
  # -----------------------------------------------------------------------
  provider: "azure_openai"

  # -----------------------------------------------------------------------
  # Azure OpenAI Embeddings
  # -----------------------------------------------------------------------
  azure_openai:
    # All secrets loaded from environment variables.
    api_key_env: "AZURE_OPENAI_API_KEY"
    azure_endpoint_env: "AZURE_OPENAI_ENDPOINT"
    # Deployment name created in your Azure OpenAI resource.
    azure_deployment: "text-embedding-3-large"
    api_version: "2024-10-01-preview"
    # Embedding vector dimension. Must match the model.
    # text-embedding-3-large: 3072 (or specify 1536/256 for smaller)
    # text-embedding-3-small: 1536
    # text-embedding-ada-002:  1536
    dimensions: 3072
    batch_size: 512
    # Maximum retries on transient API errors.
    max_retries: 3

  # -----------------------------------------------------------------------
  # OpenAI Embeddings (non-Azure)
  # -----------------------------------------------------------------------
  openai:
    api_key_env: "OPENAI_API_KEY"
    model: "text-embedding-3-large"
    dimensions: 3072
    batch_size: 512
    max_retries: 3
    organization_env: "OPENAI_ORG_ID"   # optional

  # -----------------------------------------------------------------------
  # Ollama Embeddings (fully local)
  # -----------------------------------------------------------------------
  ollama:
    base_url: "http://localhost:11434"
    # Popular embedding models available in Ollama:
    # nomic-embed-text (768d), mxbai-embed-large (1024d),
    # snowflake-arctic-embed (1024d), bge-m3 (1024d)
    model: "nomic-embed-text"
    dimensions: 768
    batch_size: 32
    # Timeout per batch in seconds.
    timeout: 120

  # -----------------------------------------------------------------------
  # SentenceTransformers (local HuggingFace models)
  # -----------------------------------------------------------------------
  sentence_transformers:
    # Best general-purpose models:
    # BAAI/bge-large-en-v1.5     (1024d) — top English retrieval
    # BAAI/bge-m3                (1024d) — multilingual
    # sentence-transformers/all-MiniLM-L6-v2 (384d) — fast, lightweight
    # intfloat/e5-large-v2       (1024d) — strong retrieval
    model: "BAAI/bge-large-en-v1.5"
    # device: cpu | cuda | mps | auto
    device: "auto"
    batch_size: 32
    normalize_embeddings: true
    # HuggingFace Hub cache directory. Null = default HF cache (~/.cache/huggingface).
    cache_dir: null
    # Instruction prefix prepended to queries (BGE models require this for queries).
    query_instruction: "Represent this sentence for searching relevant passages: "
    # No prefix for document embeddings.
    document_instruction: ""
