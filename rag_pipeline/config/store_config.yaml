document_store:
  # Backend: in_memory | qdrant | weaviate | opensearch | pgvector
  backend: "in_memory"

  in_memory:
    bm25_retrieval: true

  qdrant:
    url: "http://localhost:6333"
    collection_name: "rag_documents"
    embedding_dim: 3072        # Must match embedding.*.dimensions
    recreate_index: false
    # api_key_env: "QDRANT_API_KEY"   # For Qdrant Cloud

  weaviate:
    url: "http://localhost:8080"
    class_name: "RagDocument"

  opensearch:
    hosts: ["http://localhost:9200"]
    index_name: "rag_documents"
    embedding_field: "embedding"
    username_env: "OPENSEARCH_USERNAME"
    password_env: "OPENSEARCH_PASSWORD"

  pgvector:
    connection_string_env: "PGVECTOR_CONNECTION_STRING"
    table_name: "haystack_documents"
    embedding_dim: 3072
