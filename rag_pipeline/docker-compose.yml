version: "3.9"

services:
  # ── RAG Pipeline API ──────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CONFIG_DIR: /app/config
      # Switch to qdrant once you're ready to persist embeddings.
      # DOCUMENT_STORE__BACKEND: qdrant
    volumes:
      - ./config:/app/config:ro
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Qdrant vector store ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"    # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (local VLMs + embeddings) ─────────────────────────────────────
  # Uncomment if you want to run Ollama inside Docker.
  # For GPU support add: deploy: { resources: { reservations: { devices: [{ capabilities: [gpu] }] } } }
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   # After startup, pull models:
  #   #   docker exec -it <container> ollama pull nomic-embed-text
  #   #   docker exec -it <container> ollama pull granite3.2-vision

volumes:
  qdrant_data:
  # ollama_models:
